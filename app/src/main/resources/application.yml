
spring:
  application:
    name: chatapp

  data:
    redis:
      host: "redis-18585.c55.eu-central-1-1.ec2.cloud.redislabs.com"
      password: ${REDIS_PASSWORD}
      username: "default"
      port: 18585
      connect-timeout: 5000ms
      timeout: 2000ms

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-eu-north-1.pooler.supabase.com:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres.vccslxuszrxdslskmscv}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 12000000
      validation-timeout: 5000
      pool-name: SpringBootHikariCP
      data-source-properties:
        prepareThreshold: 5
        preparedStatementCacheQueries: 256
        preparedStatementCacheSizeMiB: 5

        tcpKeepAlive: true
        socketTimeout: 30
        connectTimeout: 10
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true
        hbm2ddl:
          create_namespaces: true

  mail:
    port: 587
    password: ${MAILGUN_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  rabbitmq:
    host: collie.lmq.cloudamqp.com
    password: ${RABBITMQ_PASSWORD}
    username: yygaalsz
    ssl:
      enabled: true
    virtual-host: yygaalsz
    listener:
      simple:
        acknowledge-mode: auto
        concurrency: 1
        max-concurrency: 3
        prefetch: 10
        default-requeue-rejected: true
        retry:
          enabled: true
          initial-interval: 1000ms
          max-interval: 10000ms
          max-attempts: 3
          multiplier: 2

jwt:
  secret: ${JWT_SECRET_BASE64}

chatapp:
  api-key:
    expires-in-days: 365
    admin:
      username: ${API_KEY_ADMIN_USERNAME}
      password: ${API_KEY_ADMIN_PASSWORD}
  email:
    from: ivan.kravchenko217@gmail.com
    verification:
      expiry-hours: 24
    reset-password:
      expiry-minutes: 30

nginx:
  trusted-ips:
    - "127.0.0.1" # nginx on same machine
    - "::1" # IPv6 localhost
    - "172.17.0.0/16" # nginx container IP when using Docker
    - "10.0.0.5/32" # nginx server IP (if separate machine)

supabase:
  url: ${SUPABASE_URL:https://vccslxuszrxdslskmscv.supabase.co}
  public-url: ${SUPABASE_PUBLIC_URL:${SUPABASE_URL:https://vccslxuszrxdslskmscv.supabase.co}}
  service-key: ${SUPABASE_SERVICE_KEY}

firebase:
  credentials-path: "classpath:firebase-credentials/chatapp-firebase-adminsdk.json"

server:
  port: 8080