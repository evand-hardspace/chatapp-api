server {
  listen 8000;
  server_name _;
  client_max_body_size 60m;

  location = / {
    default_type text/plain;
    return 200 "Supabase local gateway is running. Use /storage/v1/* endpoints.\n";
  }

  # Keep app-compatible Supabase paths by forwarding /storage/v1/* to storage-api root.
  location /storage/v1/ {
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin "$http_origin" always;
      add_header Access-Control-Allow-Credentials "true" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, apikey, x-client-info, x-requested-with" always;
      add_header Access-Control-Max-Age 86400 always;
      return 204;
    }

    add_header Access-Control-Allow-Origin "$http_origin" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, apikey, x-client-info, x-requested-with" always;

    rewrite ^/storage/v1/(.*)$ /$1 break;
    proxy_pass http://supabase-storage:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

